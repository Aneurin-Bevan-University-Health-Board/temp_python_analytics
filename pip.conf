# pip.conf — adds Test PyPI as an extra index so abspc can be installed
# alongside normal packages from PyPI.
#
# To use project-local:
#   PIP_CONFIG_FILE=pip.conf pip install -r requirements.txt
#
# To use globally, copy to ~/.pip/pip.conf

[global]
extra-index-url =
    https://test.pypi.org/simple/
    https://pypi.org/simple/
